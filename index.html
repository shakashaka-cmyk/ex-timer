<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXタイマー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div>
    <h1 id="title" class="timer-h1">EXタイマー</h1>
    <p id="timer" class="timer">01:00:00</p>
   </div>
   
   <div class="button">
        <button id="startB" class="start">すたーと</button>
        <button id="stopB" class="stop">すとっぷ</button>
        <button id="continueB" class="continue">継続</button>
        <button id="endB" class="end">終了</button>
        <button id="resetB" class="reset">りせっと</button>
   </div>

   <script src="main.js"></script>
</body>
</html>
